fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (nightly)
        language: system
        types: [rust]
        pass_filenames: false
        entry: rustup run nightly cargo fmt

      - id: cargo-clippy
        name: cargo clippy
        language: system
        types: [rust]
        pass_filenames: false
        entry: cargo clippy --
        args: [--deny, warnings]

      - id: cargo-nextest
        name: cargo nextest
        language: system
        types: [rust]
        pass_filenames: false
        entry: cargo nextest run
