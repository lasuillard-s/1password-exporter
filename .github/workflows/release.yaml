name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  OUTPUT_DIR: dist

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}

      - name: Build binary
        id: build
        run: |
          cargo build --verbose --release --target ${{ matrix.target }}

          mkdir ${{ env.OUTPUT_DIR }}
          binary_path="${{ env.OUTPUT_DIR }}/onepassword-exporter-${{ matrix.target }}"
          mv target/${{ matrix.target }}/release/onepassword-exporter "$binary_path"

          echo "binary-path=${binary_path}" >> $GITHUB_OUTPUT

      - name: Upload binary as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.target }}
          path: ${{ steps.build.outputs.binary-path }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.OUTPUT_DIR }}

      - name: Show artifacts
        run: ls -l --all --recursive dist

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: false
          files: dist/dist-*/onepassword-exporter-*

  # ... release will create tags and will trigger publish-docker job in publish.yaml
